# Vercel / GitHub Actions に登録する環境変数の定義。
#
# 値はこのファイルには書かない（git にコミットされるため）。値は .env(.production) から取得する。
# ここに宣言が無いキーは登録されない（.env にあっても警告のうえスキップされる）。
#
#   secret: true|false
#           - true  : シークレットとして登録
#                     Vercel: sensitive（保存後は値を読めない）
#                     GitHub: Actions Secret（sealed box 暗号化）
#           - false : 平文として登録
#                     Vercel: plain
#                     GitHub: Actions Variable
#           ※ 未指定時のデフォルトは true（安全側）
#
#   environments: []  登録先環境の配列
#           Vercel: production|preview|development（空なら production と preview）
#           GitHub: named environment 名（空なら repo レベル）
#           ※ GitHub の named environment は事前に作成が必要
#
#   provider: vercel|github|gcp|[vercel, gcp]|[vercel, github]
#           同期先プロバイダーを変数ごとに指定する。
#           - provider: vercel             Vercel にのみ送る
#           - provider: github             GitHub Actions にのみ送る
#           - provider: gcp               GCP Secret Manager にのみ送る
#           - provider: [vercel, gcp]      Vercel と GCP 両方に送る
#           - provider: [vercel, github]   Vercel と GitHub 両方に送る
#           解決優先順位: 変数個別 > defaults > CLI --provider フラグ（デフォルト vercel）
#           ※ 未指定なら defaults.provider → --provider フラグのデフォルト（vercel）が使われる
#
#   ---- GCP Secret Manager ----
#           必須環境変数: GCP_PROJECT_ID（対象 GCP プロジェクト ID）
#           認証: Application Default Credentials（GOOGLE_APPLICATION_CREDENTIALS または ADC 自動解決）
#           secret: true のエントリのみ同期（false はスキップ）
#           environments に値を設定すると、Secret に labels {"environment": "<env>"} が付与される
#           ※ environments が複数の場合は "-" で連結（例: [production, staging] → "production-staging"）
#
#   ---- 複数 Vercel プロジェクト / 複数 GitHub リポジトリ（モノレポ） ----
#           このファイルは「変数定義」用。複数の同期先（Vercel プロジェクト・GitHub リポジトリ）は
#           認証 config 側（.env-sync.config.yaml / ~/.config/env-sync/config.yaml）の
#           vercel.projects[] / github.repos[] で定義する。--vercel-project / --github-repo で絞り込める。
#           詳細は README「複数 Vercel プロジェクト / 複数 GitHub リポジトリ（モノレポ）」を参照。

defaults:
  secret: true

variables:
  # ---- 例 ----
  # NEXT_PUBLIC_API_BASE_URL: { secret: false }
  # DATABASE_URL:             { secret: true }
  # STAGING_KEY:              { secret: true, environments: [production] }
  #
  # ---- provider 混在の例 ----
  # VERCEL_ONLY_KEY:          { provider: vercel }
  # GITHUB_ONLY_KEY:          { provider: github }
  # SHARED_KEY:               { provider: [vercel, github] }
  #
  # ---- GCP Secret Manager の例 ----
  # GCP_PROJECT_ID=my-gcp-project env-sync --provider gcp --env .env.production
  #
  # GCP_ONLY_SECRET:          { provider: gcp }
  # GCP_ENV_SECRET:           { provider: gcp, environments: [production] }
  # VERCEL_AND_GCP_SECRET:    { provider: [vercel, gcp] }
