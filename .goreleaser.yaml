version: 2

project_name: vercel-env-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: vercel-env-sync
    binary: vercel-env-sync
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ptyhard
    name: vercel-env-sync

homebrew_casks:
  - name: vercel-env-sync
    # tap は別リポジトリではなく本リポジトリの Casks/ に同居させる。
    # token を省略すると GITHUB_TOKEN が使われるため、追加の PAT は不要。
    repository:
      owner: ptyhard
      name: vercel-env-sync
      branch: main
    directory: Casks
    homepage: https://github.com/ptyhard/vercel-env-sync
    description: "Sync environment variables to Vercel from a definition file"
    binaries:
      - vercel-env-sync
