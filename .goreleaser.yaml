version: 2

project_name: env-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: env-sync
    binary: env-sync
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ptyhard
    name: env-sync

homebrew_casks:
  - name: env-sync
    repository:
      owner: ptyhard
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/ptyhard/env-sync
    description: "Sync environment variables to Vercel or GitHub Actions from a definition file"
    binaries:
      - env-sync
